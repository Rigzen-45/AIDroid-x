# XAIDroid Configuration File
# All hyperparameters and paths for reproducibility
# Dataset Paths
paths:
  raw_apks: "data/raw"
  processed_data: "data/processed"
  graphs: "data/graphs"
  sensitive_apis: "config/sensitive_apis.json"
  models: "models/checkpoints"
  results: "results"
  logs: "logs"

# Preprocessing Settings
preprocessing:
  apk_tool_path: "/usr/local/bin/apktool"
  use_androguard: true
  min_methods: 3
  max_methods: 10000

# Sensitive API Configuration
sensitive_apis:
  count: 688
  sources:
    - "axplorer"
    - "custom"
  categories:
    - "NETWORK"
    - "SMS"
    - "PHONE"
    - "LOCATION"
    - "CAMERA"
    - "MICROPHONE"
    - "CONTACTS"
    - "STORAGE"
    - "SYSTEM"
    - "CRYPTO"

# Graph Construction
graph:
  # Documents the 41-dim node feature vector used by graph_dataset.py.
  # DO NOT add/remove entries here without updating NUM_NODE_FEATURES in
  # graph_dataset.py AND deleting all processed/ caches before retraining.
  node_features:
    group1_per_category_counts:   10   # log1p(count) for each of 10 CATS
    group2_diversity:              3   # log1p(total), fraction_cats, entropy
    group3_danger_flags:           5   # LOC+NET, CRYPTO, MIC|CAM, SMS+NET, STOR+NET
    group4_structural:             7   # degrees, fan-out, hub, code_size, api_count
    group5_name_heuristics:       10   # keyword matches (encrypt, upload, root, ...)
    group6_obfuscation:            6   # reflection_ratio, reflection_exists, obf_class/method_ratio, hub_node_ratio, max_out_degree
    total:                        41   # [CHANGE] was 35 → 41 (added G6 obfuscation features)
  graph_size_features:            2    # log1p(num_nodes), log1p(num_edges) — appended before FC head
  edge_types:
    - "direct_call"
    - "indirect_call"
    - "method_call"
    - "reflection"
  merge_strategy: "union"
  max_nodes: 5000
  max_edges: 20000

# GAT Model Configuration
# [10K DATASET TUNING — Section 10 of XAIDroid_DeepAnalysis.docx]
gat:
  num_heads: 4   # [CHANGE] was 4 → 8 heads for more diverse attention pattens
  hidden_units: 32       # [CHANGE] was 16 → 32 units/head; doubles capacity. Layer out: 8×32=256d
  dropout: 0.3           # KEEP — node dropout (already at recommended value)
  attention_dropout: 0.4 # [CHANGE] was 0.3/0.5 → 0.4; slightly less aggressive for 10K dataset
  learning_rate: 0.0003  # [CHANGE] was 0.0005 → 0.0003; larger model needs lower LR to not overshoot
  weight_decay: 0.0001   # [CHANGE] was 0.0005 → 0.0001; balanced data reduces L2 regularisation need
  epochs: 150            # [CHANGE] was 200 → 150; 10K data converges faster per epoch
  batch_size: 32        # [CHANGE] was 32 → 64; 4× more data makes larger batches viable
  early_stopping_patience: 20  # [CHANGE] was 25 → 20; more data = faster convergence signals
  warmup_epochs: 8       # [CHANGE] was 5 → 8; larger model needs more warmup to stabilise

# GAM Model Configuration
# [10K DATASET TUNING — Section 10 of XAIDroid_DeepAnalysis.docx]
gam:
  population_size: 8   # [CHANGE] was 20 → 12 for 10K (richer fitness signals per agent)
  step_size: 80      # [CHANGE] was 80 → 100; 100×64=6400 samples/agent = 64% coverage
  num_generations: 20   # [CHANGE] was 30 → 25; larger pop converges faster
  mutation_rate: 0.15   # KEEP
  crossover_rate: 0.7   # KEEP
  tournament_size: 3    # KEEP
  elitism: 2            # KEEP
  batch_size: 32   # [CHANGE] was 32 → 64; match GAT batch_size

# Explainability Thresholds
explainability:
  method_threshold: 0.0001
  class_threshold: 0.001
  min_malicious_methods: 1
  ensemble_rule: "AND"      # KEEP — protects Precision in security context
  gat_weight: 0.6           # [CHANGE] was 0.5 → 0.6; GAT AUC > GAM, trust it more
  gam_weight: 0.4           # [CHANGE] was 0.5 → 0.4

# Training Configuration
training:
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  random_seed: 42
  device: "cuda"
  mixed_precision: true
  gradient_clip: 1.0

# Evaluation Metrics
metrics:
  - "accuracy"
  - "precision"
  - "recall"
  - "f1_score"
  - "AUC"
  - "confusion_matrix"

# Logging
logging:
  level: "INFO"
  console: true
  file: true
  tensorboard: true
  wandb: false

# Reproducibility
reproducibility:
  seed: 42
  deterministic: true
  benchmark: false
